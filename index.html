<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Dua Dimensi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    
    <style>
        /* CSS Reset & Dasar */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f6f9; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        /* Desain Card Utama */
        .card { 
            background: #ffffff; 
            padding: 40px 32px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(14, 88, 166, 0.08); 
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        
        .card h2 {
            font-weight: 600;
            font-size: 22px;
            margin-bottom: 24px;
            color: #111;
        }

        /* Desain Input */
        .input-group { 
            margin-bottom: 16px; 
            text-align: left;
        }
        .input-group label {
            display: block;
            font-weight: 500;
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
        }
        input[type="text"] { 
            width: 100%; 
            padding: 12px 16px; 
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            border: 1px solid #e2e8f0; 
            border-radius: 8px; 
            transition: all 0.3s ease;
            outline: none;
            background-color: #fafbfc;
        }
        input[type="text"]:focus {
            border-color: #0e58a6;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(14, 88, 166, 0.15);
        }
        
        /* Tombol Buat QR */
        #btn-buat { 
            background-color: #0e58a6;
            color: #ffffff; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            width: 100%;
            margin-top: 8px;
            transition: all 0.3s ease;
        }
        #btn-buat:hover { 
            background-color: #0a427c; 
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(14, 88, 166, 0.2);
        }

        /* Wadah Hasil Canvas */
        #canvas-container { 
            margin-top: 24px; 
            padding: 16px; 
            background: #f8fafc; 
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
            display: none; 
            animation: fadeIn 0.5s ease-in-out;
        }
        canvas { 
            max-width: 100%; 
            height: auto;
            border-radius: 8px;
        }

        /* Grup Tombol Unduh */
        .btn-group {
            display: none; /* Disembunyikan sampai QR dibuat */
            gap: 12px;
            margin-top: 16px;
            animation: fadeIn 0.5s ease-in-out;
        }

        /* Tombol Unduh (Gaya Outline) */
        .btn-outline {
            flex: 1; /* Membuat kedua tombol berukuran sama */
            background-color: transparent; 
            color: #0e58a6; 
            padding: 12px; 
            border: 2px solid #0e58a6; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .btn-outline:hover { 
            background-color: #0e58a6; 
            color: #ffffff;
        }

        /* Animasi Muncul */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Buat QR Code</h2>
        
        <div class="input-group">
            <label>Teks atau URL Tujuan</label>
            <input type="text" id="input-teks" placeholder="Masukkan link atau teks...">
        </div>
        
        <div class="input-group">
            <label>Judul File & QR Code</label>
            <input type="text" id="input-judul" placeholder="Contoh: Website Perusahaan">
        </div>
        
        <button id="btn-buat" onclick="buatQR()">Generate QR Code</button>
        
        <div id="canvas-container">
            <canvas id="qr-canvas" width="400" height="450"></canvas>
        </div>

        <div class="btn-group" id="grup-unduh">
            <button class="btn-outline" onclick="unduhGambar('png')">Unduh PNG</button>
            <button class="btn-outline" onclick="unduhGambar('svg')">Unduh SVG</button>
        </div>
    </div>

    <script>
        const logoUrl = "https://lh3.googleusercontent.com/d/196-yYlDwDc-tUVDTslzPAlBWTmf4ZbWg";
        
        // Variabel global untuk menyimpan data SVG mentah
        let currentQrSvgData = ""; 
        let currentLogoBase64 = "";

        function buatQR() {
            const teks = document.getElementById("input-teks").value;
            const judul = document.getElementById("input-judul").value;
            
            if (!teks) {
                alert("Mohon masukkan Teks atau URL tujuan terlebih dahulu.");
                return;
            }

            const canvas = document.getElementById("qr-canvas");
            const ctx = canvas.getContext("2d");

            // 1. Latar Belakang Canvas
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Menggambar Judul
            ctx.fillStyle = "#111111";
            ctx.font = "bold 22px 'Inter', Arial, sans-serif";
            ctx.textAlign = "center";
            let teksJudul = judul.trim() === "" ? "QR Code" : judul;
            ctx.fillText(teksJudul, canvas.width / 2, 45); 

            // 3. Membuat QR Code di canvas sementara (Untuk PNG)
            const tempCanvas = document.createElement("canvas");
            
            QRCode.toCanvas(tempCanvas, teks, {
                width: 360,
                margin: 1,
                color: { dark: "#000000", light: "#ffffff" },
                errorCorrectionLevel: 'H' 
            }, function (error) {
                if (error) console.error(error);
                ctx.drawImage(tempCanvas, 20, 65, 360, 360);

                // 4. Generate QR Code ke dalam format String SVG (Untuk fitur Download SVG)
                QRCode.toString(teks, {
                    type: 'svg',
                    margin: 1,
                    color: { dark: "#000000", light: "#ffffff" },
                    errorCorrectionLevel: 'H'
                }, function (err, svgString) {
                    if (err) console.error(err);
                    
                    // Modifikasi tag <svg> bawaan agar ukurannya pas di tata letak kita
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(svgString, "image/svg+xml");
                    const svgEl = doc.documentElement;
                    svgEl.setAttribute("width", "360");
                    svgEl.setAttribute("height", "360");
                    svgEl.setAttribute("x", "20");
                    svgEl.setAttribute("y", "65");
                    currentQrSvgData = svgEl.outerHTML;

                    // 5. Memasukkan Logo di Tengah
                    const img = new Image();
                    img.crossOrigin = "Anonymous"; 
                    img.src = logoUrl;
                    
                    img.onload = function() {
                        // Simpan logo ke Base64 (Untuk disematkan ke dalam file SVG nantinya)
                        const imgCanvas = document.createElement("canvas");
                        imgCanvas.width = img.width;
                        imgCanvas.height = img.height;
                        imgCanvas.getContext("2d").drawImage(img, 0, 0);
                        currentLogoBase64 = imgCanvas.toDataURL("image/png");

                        // Gambar logo di canvas utama (Untuk PNG)
                        const logoSize = 80; 
                        const x = 20 + (360 / 2) - (logoSize / 2);
                        const y = 65 + (360 / 2) - (logoSize / 2);

                        ctx.fillStyle = "#ffffff";
                        ctx.beginPath();
                        ctx.arc(x + logoSize/2, y + logoSize/2, (logoSize/2) + 6, 0, 2 * Math.PI);
                        ctx.fill();

                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(x + logoSize/2, y + logoSize/2, logoSize/2, 0, Math.PI * 2, true);
                        ctx.closePath();
                        ctx.clip();
                        ctx.drawImage(img, x, y, logoSize, logoSize);
                        ctx.restore();

                        // Tampilkan Hasil & Tombol Unduh
                        document.getElementById("canvas-container").style.display = "block";
                        document.getElementById("grup-unduh").style.display = "flex";
                    };
                });
            });
        }

        // Fungsi gabungan untuk mengunduh PNG atau SVG
        function unduhGambar(format) {
            const judulInput = document.getElementById("input-judul").value.trim();
            let namaFile = judulInput === "" ? "QR_Code" : judulInput;
            namaFile = namaFile.replace(/\s+/g, '_'); 

            const link = document.createElement("a");

            if (format === 'png') {
                const canvas = document.getElementById("qr-canvas");
                link.download = namaFile + ".png";
                link.href = canvas.toDataURL("image/png");
            } 
            else if (format === 'svg') {
                let judulTeks = judulInput === "" ? "QR Code" : judulInput;
                
                // Menyusun kode struktur gambar SVG
                const svgLengkap = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="400" height="450">
                        <rect width="400" height="450" fill="#ffffff" />
                        <text x="200" y="45" font-family="'Inter', Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#111111">${judulTeks}</text>
                        
                        ${currentQrSvgData}
                        
                        <circle cx="200" cy="245" r="46" fill="#ffffff" />
                        <clipPath id="logo-clip">
                            <circle cx="200" cy="245" r="40" />
                        </clipPath>
                        <image href="${currentLogoBase64}" x="160" y="205" width="80" height="80" clip-path="url(#logo-clip)" preserveAspectRatio="xMidYMid slice" />
                    </svg>
                `;

                // Buat Blob dari string SVG dan siapkan link unduhan
                const blob = new Blob([svgLengkap], { type: "image/svg+xml;charset=utf-8" });
                link.download = namaFile + ".svg";
                link.href = URL.createObjectURL(blob);
            }

            // Eksekusi Unduhan
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
